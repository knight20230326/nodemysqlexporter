<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySQL SSH Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/jstree@3.3.12/dist/themes/default/style.min.css" rel="stylesheet">
  <style>
    .container-fluid { height: 100vh; }
    .sidebar { width: 300px; height: 100%; overflow-y: auto; }
    .main-content { flex: 1; display: flex; flex-direction: column; }
    .sql-toolbar { padding: 10px; background: #f8f9fa; border-bottom: 1px solid #dee2e6; }
    .data-area { flex: 1; overflow: auto; }
  </style>
</head>
<body>
  <div class="container-fluid d-flex">
    <!-- 左侧连接树 -->
    <div class="sidebar border-end">
      <div class="p-2">
        <button class="btn btn-primary btn-sm w-100" onclick="addConnection()">添加连接</button>
      </div>
      <div id="connection-tree"></div>
    </div>

    <!-- 右侧主内容 -->
    <div class="main-content">
      <!-- SQL 工具栏 -->
      <div class="sql-toolbar">
        <div class="input-group">
          <textarea id="sql-input" class="form-control" rows="3" placeholder="输入 SQL 语句..."></textarea>
          <button class="btn btn-success" onclick="executeSQL()">执行</button>
        </div>
      </div>

      <!-- 数据展示区域 -->
      <div class="data-area p-2">
        <div id="data-content">
          <p class="text-muted">请选择数据库或表查看数据</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 连接配置模态框 -->
  <div class="modal fade" id="connectionModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">数据库连接配置</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="connection-form">
            <div class="mb-3">
              <label class="form-label">连接名称</label>
              <input type="text" class="form-control" id="conn-name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">SSH 主机</label>
              <input type="text" class="form-control" id="ssh-host" required>
            </div>
            <div class="mb-3">
              <label class="form-label">SSH 端口</label>
              <input type="number" class="form-control" id="ssh-port" value="22">
            </div>
            <div class="mb-3">
              <label class="form-label">SSH 用户名</label>
              <input type="text" class="form-control" id="ssh-username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">SSH 密码</label>
              <input type="password" class="form-control" id="ssh-password">
            </div>
            <div class="mb-3">
              <label class="form-label">MySQL 主机</label>
              <input type="text" class="form-control" id="mysql-host" value="127.0.0.1">
            </div>
            <div class="mb-3">
              <label class="form-label">MySQL 端口</label>
              <input type="number" class="form-control" id="mysql-port" value="3306">
            </div>
            <div class="mb-3">
              <label class="form-label">MySQL 用户名</label>
              <input type="text" class="form-control" id="mysql-username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">MySQL 密码</label>
              <input type="password" class="form-control" id="mysql-password">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="saveConnection()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jstree@3.3.12/dist/jstree.min.js"></script>
  <script src="./renderer.js"></script>
</body>
</html>
